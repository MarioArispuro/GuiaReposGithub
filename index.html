<!DOCTYPE html>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@400;500;600;700&display=swap');

:root {
  --gh-dark: #0d1117;
  --gh-card: #161b22;
  --gh-border: #30363d;
  --gh-green: #238636;
  --gh-green-light: #2ea043;
  --gh-blue: #1f6feb;
  --gh-text: #e6edf3;
  --gh-muted: #7d8590;
  --gh-accent: #f78166;
  --step-done: #238636;
  --step-active: #1f6feb;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--gh-dark);
  color: var(--gh-text);
  min-height: 100vh;
  padding: 0 0 40px;
}

/* ─── Header ─── */
.header {
  background: var(--gh-card);
  border-bottom: 1px solid var(--gh-border);
  padding: 20px 28px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.gh-logo { width: 34px; height: 34px; fill: var(--gh-text); flex-shrink: 0; }
.header-text h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.header-text p  { font-size: 12px; color: var(--gh-muted); margin-top: 2px; }
.badge {
  margin-left: auto;
  background: var(--gh-green);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
}

/* ─── Progress bar ─── */
.progress-wrap {
  padding: 18px 28px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.progress-track {
  flex: 1;
  height: 6px;
  background: var(--gh-border);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gh-green), var(--gh-blue));
  border-radius: 99px;
  transition: width 0.4s ease;
}
.progress-label { font-size: 12px; color: var(--gh-muted); white-space: nowrap; font-family: 'JetBrains Mono', monospace; }

/* ─── Steps nav (pills) ─── */
.steps-nav {
  display: flex;
  gap: 6px;
  padding: 16px 28px 0;
  flex-wrap: wrap;
}
.step-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--gh-border);
  background: transparent;
  color: var(--gh-muted);
  transition: all 0.2s;
  font-family: 'Sora', sans-serif;
}
.step-pill:hover { border-color: var(--gh-blue); color: var(--gh-text); }
.step-pill.active { background: var(--gh-blue); border-color: var(--gh-blue); color: #fff; }
.step-pill.done { border-color: var(--gh-green); color: #3fb950; }
.step-num {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  background: var(--gh-border);
  transition: all 0.2s;
}
.step-pill.active .step-num { background: rgba(255,255,255,0.2); }
.step-pill.done .step-num { background: var(--gh-green); color: #fff; }

/* ─── Main card ─── */
.step-card {
  margin: 16px 28px 0;
  background: var(--gh-card);
  border: 1px solid var(--gh-border);
  border-radius: 12px;
  overflow: hidden;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.card-header {
  padding: 18px 22px 16px;
  border-bottom: 1px solid var(--gh-border);
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.step-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  background: rgba(31,111,235,0.15);
  border: 1px solid rgba(31,111,235,0.3);
}
.card-header h2 { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.card-header p  { font-size: 13px; color: var(--gh-muted); line-height: 1.5; }

.card-body { padding: 20px 22px; }

/* ─── Substeps ─── */
.substep {
  display: flex;
  gap: 14px;
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--gh-border);
}
.substep:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

.substep-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--gh-blue);
  color: #fff;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.substep-content h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.substep-content p  { font-size: 13px; color: var(--gh-muted); line-height: 1.6; margin-bottom: 8px; }

/* ─── Code blocks ─── */
.code-block {
  background: var(--gh-dark);
  border: 1px solid var(--gh-border);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  line-height: 1.8;
  position: relative;
  margin-top: 8px;
}
.code-block .comment { color: var(--gh-muted); }
.code-block .cmd     { color: #79c0ff; }
.code-block .str     { color: #a5d6ff; }
.code-block .flag    { color: #ffa657; }
.code-line { display: flex; align-items: flex-start; gap: 8px; }
.prompt { color: var(--gh-green); user-select: none; flex-shrink: 0; }

.copy-btn {
  position: absolute;
  top: 8px; right: 8px;
  background: var(--gh-border);
  border: none;
  color: var(--gh-muted);
  font-family: 'Sora', sans-serif;
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.copy-btn:hover { background: var(--gh-blue); color: #fff; }

/* ─── Tips ─── */
.tip {
  display: flex;
  gap: 10px;
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.6;
  margin-top: 10px;
}
.tip.info    { background: rgba(31,111,235,0.1);  border: 1px solid rgba(31,111,235,0.3); }
.tip.warning { background: rgba(210,153,34,0.1);  border: 1px solid rgba(210,153,34,0.3); }
.tip.success { background: rgba(35,134,54,0.1);   border: 1px solid rgba(35,134,54,0.3); }
.tip.danger  { background: rgba(247,129,102,0.1); border: 1px solid rgba(247,129,102,0.3); }
.tip-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.tip p { color: var(--gh-text); }
.tip strong { color: #fff; }

/* ─── Screenshot mockup ─── */
.mockup {
  background: var(--gh-dark);
  border: 1px solid var(--gh-border);
  border-radius: 8px;
  overflow: hidden;
  margin-top: 10px;
}
.mockup-bar {
  background: #21262d;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--gh-border);
}
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot.r { background: #f85149; }
.dot.y { background: #d29922; }
.dot.g { background: #3fb950; }
.url-bar {
  flex: 1;
  background: var(--gh-dark);
  border: 1px solid var(--gh-border);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--gh-muted);
  font-family: 'JetBrains Mono', monospace;
}
.mockup-body { padding: 14px 16px; font-size: 12px; }

/* ─── Checklist ─── */
.checklist { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.checklist li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  padding: 10px 14px;
  background: var(--gh-dark);
  border: 1px solid var(--gh-border);
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 0.2s;
  user-select: none;
}
.checklist li:hover { border-color: var(--gh-blue); }
.checklist li.checked { border-color: var(--gh-green); color: #3fb950; }
.check-box {
  width: 18px; height: 18px;
  border: 1.5px solid var(--gh-border);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  transition: all 0.2s;
}
.checklist li.checked .check-box { background: var(--gh-green); border-color: var(--gh-green); color: #fff; }

/* ─── Nav buttons ─── */
.nav-btns {
  display: flex;
  gap: 10px;
  padding: 16px 28px 0;
}
.btn {
  padding: 9px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: 'Sora', sans-serif;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.btn-secondary { background: #21262d; color: var(--gh-text); border: 1px solid var(--gh-border); }
.btn-secondary:hover { border-color: var(--gh-blue); }
.btn-primary { background: var(--gh-green-light); color: #fff; }
.btn-primary:hover { background: var(--gh-green); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ─── Final card ─── */
.final-card {
  text-align: center;
  padding: 32px 24px;
}
.final-card .big-emoji { font-size: 48px; margin-bottom: 14px; }
.final-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.final-card p  { font-size: 14px; color: var(--gh-muted); line-height: 1.6; max-width: 420px; margin: 0 auto 20px; }
.repo-url {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--gh-dark);
  border: 1px solid var(--gh-green);
  border-radius: 8px;
  padding: 10px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #3fb950;
}
</style>

        tip: { type: 'success', icon: '📸', text: 'Incluye capturas de: <strong>inicio del servidor, registro de usuario, chat grupal y mensaje privado.</strong> Suman puntos en la rúbrica.' }

  {

let current = 0;
const checked = {};

function renderNav() {
  const nav = document.getElementById('steps-nav');
  nav.innerHTML = steps.map((s, i) => `
    <button class="step-pill ${i < current ? 'done' : ''} ${i === current ? 'active' : ''}" onclick="goTo(${i})">
      <span class="step-num">${i < current ? '✓' : i + 1}</span>
      ${s.icon} ${s.title.split(' ').slice(0,2).join(' ')}
    </button>
  `).join('');
}

function renderProgress() {
  const pct = Math.round(((current + 1) / steps.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `Paso ${current + 1} / ${steps.length}`;
}

function renderCode(lines) {
  if (!lines) return '';
  return `<div class="code-block">
    <button class="copy-btn" onclick="copyCode(this)">Copiar</button>
    ${lines.map(l => {
      if (l.comment !== undefined) return `<div class="code-line"><span class="comment">${l.comment}</span></div>`;
      return `<div class="code-line"><span class="prompt">${l.prompt}</span><span class="cmd"> ${l.cmd||''}</span><span class="flag"> ${l.flag||''}</span><span class="str"> ${l.str||''}</span></div>`;
    }).join('')}
  </div>`;
}

function renderStep() {
  const s = steps[current];
  const container = document.getElementById('step-container');

  if (current === steps.length - 1 && s.checklist) {
    const checkItems = s.checklist.map((item, i) => `
      <li id="chk-${i}" class="${checked[i] ? 'checked' : ''}" onclick="toggleCheck(${i})">
        <span class="check-box">${checked[i] ? '✓' : ''}</span>
        ${item}
      </li>
    `).join('');

    const substepsHtml = s.substeps.map(sub => `
      <div class="substep">
        <div class="substep-num">${sub.n}</div>
        <div class="substep-content">
          <h3>${sub.title}</h3>
          <p>${sub.body}</p>
          ${sub.code ? renderCode(sub.code) : ''}
          ${sub.tip ? `<div class="tip ${sub.tip.type}"><span class="tip-icon">${sub.tip.icon}</span><p>${sub.tip.text}</p></div>` : ''}
        </div>
      </div>
    `).join('');

    container.innerHTML = `<div class="step-card">
      <div class="card-header">
        <div class="step-icon">${s.icon}</div>
        <div><h2>${s.title}</h2><p>${s.subtitle}</p></div>
      </div>
      <div class="card-body">
        <p style="font-size:13px;color:var(--gh-muted);margin-bottom:12px">✅ Marca cada tarea cuando la completes:</p>
        <ul class="checklist">${checkItems}</ul>
        <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--gh-border)">
          ${substepsHtml}
        </div>
        <div style="margin-top:20px;text-align:center;padding:24px;background:rgba(35,134,54,0.08);border:1px solid rgba(35,134,54,0.3);border-radius:10px">
          <div style="font-size:36px;margin-bottom:8px">🎉</div>
          <div style="font-size:15px;font-weight:700;margin-bottom:4px">¡Proyecto listo en GitHub!</div>
          <div style="font-size:13px;color:var(--gh-muted);margin-bottom:12px">Envía el enlace junto con tu proyecto por correo al maestro.</div>
          <div class="repo-url">github.com / tu-usuario / chat-tcp-udp-java</div>
        </div>
      </div>
    </div>`;
    return;
  }

  const substepsHtml = s.substeps.map(sub => `
    <div class="substep">
      <div class="substep-num">${sub.n}</div>
      <div class="substep-content">
        <h3>${sub.title}</h3>
        <p>${sub.body}</p>
        ${sub.list ? `<ul style="list-style:none;margin:8px 0;display:flex;flex-direction:column;gap:6px">${sub.list.map(li => `<li style="font-size:13px;padding:6px 12px;background:var(--gh-dark);border:1px solid var(--gh-border);border-radius:6px">${li}</li>`).join('')}</ul>` : ''}
        ${sub.mockup ? `<div class="mockup"><div class="mockup-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="url-bar">github.com/new</span></div><div class="mockup-body" style="color:var(--gh-muted)"><div style="display:flex;flex-direction:column;gap:6px"><div style="background:#21262d;border:1px solid var(--gh-border);border-radius:6px;padding:8px 10px;font-family:JetBrains Mono,monospace;font-size:12px"><span style="color:#3fb950">Owner</span> / <span style="color:#79c0ff">chat-tcp-udp-java</span></div><div style="font-size:12px">☑️ Public &nbsp;&nbsp; ☑️ Add README &nbsp;&nbsp; ☑️ .gitignore: Java</div><div style="background:var(--gh-green-light);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;display:inline-block;margin-top:4px">Create repository</div></div></div></div>` : ''}
        ${sub.code ? renderCode(sub.code) : ''}
        ${sub.tip ? `<div class="tip ${sub.tip.type}"><span class="tip-icon">${sub.tip.icon}</span><p>${sub.tip.text}</p></div>` : ''}
      </div>
    </div>
  `).join('');

  container.innerHTML = `<div class="step-card">
    <div class="card-header">
      <div class="step-icon">${s.icon}</div>
      <div><h2>${s.title}</h2><p>${s.subtitle}</p></div>
    </div>
    <div class="card-body">${substepsHtml}</div>
  </div>`;
}

function toggleCheck(i) {
  checked[i] = !checked[i];
  renderStep();
}

function navigate(dir) {
  current = Math.max(0, Math.min(steps.length - 1, current + dir));
  update();
}

function goTo(i) {
  current = i;
  update();
}

function update() {
  renderNav();
  renderProgress();
  renderStep();
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === steps.length - 1;
  document.getElementById('step-container').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyCode(btn) {
  const block = btn.parentElement;
  const text = [...block.querySelectorAll('.code-line, .comment')].map(l => l.textContent.trim()).filter(Boolean).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '¡Copiado!';
    btn.style.background = 'var(--gh-green)';
    btn.style.color = '#fff';
    setTimeout(() => { btn.textContent = 'Copiar'; btn.style.background = ''; btn.style.color = ''; }, 1500);
  });
}

update();
</script>
